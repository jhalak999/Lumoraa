services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lumora
      POSTGRES_PASSWORD: lumora
      POSTGRES_DB: lumora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumora"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    environment:
      # Inside the Docker network, containers reach each other by service
      # name, not "localhost" — these override whatever .env has (which is
      # correct for running the API directly on your host machine instead).
      DATABASE_URL: postgresql+psycopg://lumora:lumora@postgres:5432/lumora
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  celery_worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://lumora:lumora@postgres:5432/lumora
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: "postgres://lumora:lumora@postgres:5432/lumora"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    command: celery -A app.tasks.celery_app beat --loglevel=info

volumes:
  postgres_data:
